<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning With AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0e0f13; --bg2: #16181f; --bg3: #1e2029; --sidebar: #13141a;
      --border: rgba(255,255,255,0.07); --accent: #7c6ef7; --accent2: #a89af9;
      --text: #e8e9f0; --text2: #9a9baa; --text3: #5a5b6a;
      --claude-bg: #1a1f2e; --claude-border: rgba(124,110,247,0.3);
      --gemini-bg: #1a2a1f; --gemini-border: rgba(66,200,100,0.3); --gemini: #42c864;
      --perplexity-bg: #1f1a2a; --perplexity-border: rgba(32,156,238,0.3); --perplexity: #209CEE;
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; direction: rtl; }
    .hidden { display: none !important; }

    /* WELCOME */
    #welcome-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(ellipse at 50% 0%, rgba(124,110,247,0.15) 0%, transparent 60%); }
    .welcome-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 380px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
    .logo-icon { font-size: 36px; color: var(--accent); margin-bottom: 12px; display: block; }
    .welcome-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .welcome-card p { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
    .input-group { display: flex; flex-direction: column; gap: 12px; }
    .input-group input { width: 100%; padding: 14px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Vazirmatn', sans-serif; font-size: 15px; outline: none; text-align: right; direction: rtl; transition: border-color 0.2s; }
    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--text3); }
    .input-group button { padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Vazirmatn', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .input-group button:hover { background: var(--accent2); }
    #welcome-error { display: block; color: #f87171; font-size: 13px; margin-top: 12px; min-height: 18px; }

    /* CHAT */
    #chat-screen { display: flex; height: 100vh; }
    .sidebar { width: 240px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 18px 16px; border-bottom: 1px solid var(--border); }
    .app-title { font-size: 15px; font-weight: 700; }
    .group-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; margin: 8px 8px 0; border-radius: var(--radius-sm); font-size: 14px; color: var(--text2); }
    .group-item.active { background: rgba(124,110,247,0.15); color: var(--accent2); }
    .group-icon { font-weight: 700; font-size: 16px; color: var(--text3); }
    .group-item.active .group-icon { color: var(--accent); }
    .sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .current-user { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
    #sidebar-username { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .icon-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 6px; flex-shrink: 0; transition: color 0.2s; }
    .icon-btn:hover { color: var(--text); background: var(--bg3); }
    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    .chat-header { padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); flex-shrink: 0; gap: 12px; }
    .chat-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .channel-name { font-size: 15px; font-weight: 600; }
    .member-count { font-size: 12px; color: var(--text3); }
    .ai-toggles { display: flex; align-items: center; gap: 14px; }
    .toggle-wrap { display: flex; align-items: center; gap: 7px; }
    .toggle-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { display: none; }
    .slider { position: absolute; inset: 0; background: var(--bg3); border-radius: 20px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
    .slider::before { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--text3); top: 2px; right: 2px; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked + .slider { background: rgba(124,110,247,0.2); border-color: var(--accent); }
    .toggle input:checked + .slider::before { background: var(--accent); transform: translateX(-16px); }
    .toggle.gemini input:checked + .slider { background: rgba(66,200,100,0.15); border-color: var(--gemini); }
    .toggle.gemini input:checked + .slider::before { background: var(--gemini); }
    .toggle.perplexity input:checked + .slider { background: rgba(32,156,238,0.15); border-color: var(--perplexity); }
    .toggle.perplexity input:checked + .slider::before { background: var(--perplexity); }

    /* MESSAGES */
    .messages-container { flex: 1; overflow-y: auto; padding: 20px 20px 8px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .loading-msgs { color: var(--text3); font-size: 14px; text-align: center; margin: auto; }
    .chat-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 42px; color: rgba(255,255,255,0.03); white-space: nowrap; pointer-events: none; user-select: none; font-weight: 700; letter-spacing: 2px; }
    .msg-group { display: flex; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); align-items: flex-start; transition: background 0.1s; }
    .msg-group:hover { background: rgba(255,255,255,0.02); }
    .msg-group.is-claude { background: var(--claude-bg); border: 1px solid var(--claude-border); margin: 6px 0; border-radius: var(--radius); }
    .msg-group.is-claude:hover { background: var(--claude-bg); }
    .msg-group.is-gemini { background: var(--gemini-bg); border: 1px solid var(--gemini-border); margin: 6px 0; border-radius: var(--radius); }
    .msg-group.is-gemini:hover { background: var(--gemini-bg); }
    .msg-group.is-perplexity { background: var(--perplexity-bg); border: 1px solid var(--perplexity-border); margin: 6px 0; border-radius: var(--radius); }
    .msg-group.is-perplexity:hover { background: var(--perplexity-bg); }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.claude { background: linear-gradient(135deg, #7c6ef7, #a89af9); font-size: 11px; }
    .msg-avatar.gemini { background: linear-gradient(135deg, #42c864, #1a9e3f); font-size: 11px; }
    .msg-avatar.perplexity { background: linear-gradient(135deg, #209CEE, #0070c0); font-size: 11px; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .msg-name { font-size: 14px; font-weight: 600; }
    .msg-name.claude-name { color: var(--accent2); }
    .msg-name.gemini-name { color: var(--gemini); }
    .msg-name.perplexity-name { color: var(--perplexity); }
    .msg-time { font-size: 11px; color: var(--text3); }
    .msg-delete { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; margin-right: auto; transition: color 0.2s; }
    .msg-delete:hover { color: #f87171; }
    .msg-group:hover .msg-delete { display: inline-block; }
    .msg-text { font-size: 14px; line-height: 1.7; word-wrap: break-word; white-space: pre-wrap; color: var(--text); }
    .msg-img { max-width: 320px; max-height: 320px; border-radius: var(--radius-sm); margin-top: 10px; display: block; border: 1px solid var(--gemini-border); cursor: pointer; transition: opacity 0.2s; }
    .msg-img:hover { opacity: 0.85; }
    .msg-file { display: flex; align-items: center; gap: 8px; margin-top: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; color: var(--text2); }
    .msg-file-icon { font-size: 20px; }
    .msg-sources { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .msg-source { font-size: 11px; color: var(--perplexity); background: rgba(32,156,238,0.1); padding: 3px 10px; border-radius: 20px; text-decoration: none; border: 1px solid rgba(32,156,238,0.2); }
    .msg-source:hover { background: rgba(32,156,238,0.2); }
    .search-badge { font-size: 11px; color: var(--perplexity); background: rgba(32,156,238,0.1); padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(32,156,238,0.2); margin-bottom: 6px; display: inline-block; }

    /* TYPING */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing-indicator.gemini-typing span { background: var(--gemini); }
    .typing-indicator.perplexity-typing span { background: var(--perplexity); }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

    /* INPUT AREA */
    .input-area { padding: 12px 16px 20px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .plus-btn { width: 40px; height: 40px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; transition: background 0.2s, color 0.2s; position: relative; }
    .plus-btn:hover { background: var(--bg2); color: var(--text); }
    .plus-menu { position: absolute; bottom: 52px; right: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; min-width: 180px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 10; }
    .plus-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text2); transition: background 0.15s; }
    .plus-menu-item:hover { background: var(--bg3); color: var(--text); }
    .plus-menu-item span { font-size: 18px; }
    #message-input { flex: 1; padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Vazirmatn', sans-serif; font-size: 14px; outline: none; direction: rtl; transition: border-color 0.2s; resize: none; min-height: 44px; max-height: 120px; overflow-y: auto; }
    #message-input:focus { border-color: rgba(124,110,247,0.5); }
    #message-input::placeholder { color: var(--text3); }
    #send-btn { width: 44px; height: 44px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* FILE PREVIEW */
    .file-preview { padding: 8px 16px 0; display: flex; align-items: center; gap: 8px; }
    .file-preview-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .file-preview-remove { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 2px; }
    .file-preview-remove:hover { color: #f87171; }

    /* IMAGE MODAL */
    .img-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .img-modal-overlay.active { display: flex; }
    .img-modal-overlay img { max-width: 90vw; max-height: 78vh; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .img-modal-btns { display: flex; gap: 12px; }
    .img-modal-btn { padding: 10px 24px; border: none; border-radius: var(--radius-sm); font-family: 'Vazirmatn', sans-serif; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
    .img-modal-btn:hover { opacity: 0.85; }
    .img-modal-close { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 18px; cursor: pointer; transition: background 0.2s; }
    .img-modal-close:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="welcome-card">
      <div class="logo-icon">✦</div>
      <h1>Planning With AI</h1>
      <p>یک اسم برای خودت انتخاب کن</p>
      <div class="input-group">
        <input type="text" id="username-input" placeholder="اسمت رو بنویس..." maxlength="20" />
        <button id="enter-btn">ورود</button>
      </div>
      <span id="welcome-error"></span>
    </div>
  </div>

  <div id="chat-screen" class="hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="app-title">✦ Planning With AI</div>
      </div>
      <div class="group-item active">
        <span class="group-icon">#</span>
        <span>گروه عمومی</span>
      </div>
      <div class="sidebar-footer">
        <div class="current-user">
          <div class="avatar" id="sidebar-avatar"></div>
          <span id="sidebar-username"></span>
        </div>
        <button class="icon-btn" id="logout-btn" title="خروج">↩</button>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        <div class="chat-header-right">
          <span class="channel-name"># گروه عمومی</span>
          <span class="member-count" id="member-count"></span>
        </div>
        <div class="ai-toggles">
          <div class="toggle-wrap">
            <span class="toggle-label">Claude</span>
            <label class="toggle">
              <input type="checkbox" id="claude-toggle" checked />
              <span class="slider"></span>
            </label>
          </div>
          <div class="toggle-wrap">
            <span class="toggle-label">Gemini</span>
            <label class="toggle gemini">
              <input type="checkbox" id="gemini-toggle" checked />
              <span class="slider"></span>
            </label>
          </div>
          <div class="toggle-wrap">
            <span class="toggle-label">Perplexity</span>
            <label class="toggle perplexity">
              <input type="checkbox" id="perplexity-toggle" checked />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="messages-container" id="messages-container">
        <div class="loading-msgs">در حال بارگذاری پیام‌ها...</div>
      </div>

      <div class="chat-watermark">امیرطاها نجفی از مدرسه نیکان</div>

      <div class="file-preview hidden" id="file-preview"></div>

      <div class="input-area">
        <div class="plus-btn" id="plus-btn">
          <span>+</span>
          <div class="plus-menu hidden" id="plus-menu">
            <div class="plus-menu-item" id="attach-file-btn">
              <span>📎</span>
              <span>پیوست فایل</span>
            </div>
          </div>
        </div>
        <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.txt,.doc,.docx" />
        <textarea id="message-input" placeholder="پیامت رو بنویس..." rows="1"></textarea>
        <button id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Image Modal -->
  <div class="img-modal-overlay" id="img-modal">
    <button class="img-modal-close" id="img-modal-close">✕</button>
    <img id="img-modal-img" src="" alt="تصویر" />
    <div class="img-modal-btns">
      <button class="img-modal-btn" id="img-modal-download" style="background:var(--accent);color:white;">⬇ دانلود</button>
      <button class="img-modal-btn" id="img-modal-copy" style="background:var(--bg3);color:var(--text);">📋 کپی</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const WORKER_URL = "https://planning-ai.motanjf.workers.dev";

    const firebaseConfig = {
      apiKey: "AIzaSyAKX7Qphz83ImmoLplsdlLvoHknnny1nU4",
      authDomain: "planning-with-ai-46ccb.firebaseapp.com",
      projectId: "planning-with-ai-46ccb",
      storageBucket: "planning-with-ai-46ccb.firebasestorage.app",
      messagingSenderId: "460552947425",
      appId: "1:460552947425:web:feae278abe8d1d6e4b99a0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesRef = collection(db, "group_messages");

    let currentUser = null;
    let allMessages = [];
    let claudeEnabled = true;
    let geminiEnabled = true;
    let perplexityEnabled = true;
    let pendingFile = null;
    const imageCache = new Map();

    // AUTO-RESIZE TEXTAREA
    const msgInput = document.getElementById("message-input");
    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
    });

    // PLUS MENU
    const plusBtn = document.getElementById("plus-btn");
    const plusMenu = document.getElementById("plus-menu");
    plusBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      plusMenu.classList.toggle("hidden");
    });
    document.addEventListener("click", () => plusMenu.classList.add("hidden"));

    document.getElementById("attach-file-btn").addEventListener("click", () => {
      document.getElementById("file-input").click();
    });

    document.getElementById("file-input").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      pendingFile = file;
      const preview = document.getElementById("file-preview");
      preview.classList.remove("hidden");
      preview.innerHTML = `
        <div class="file-preview-item">
          <span>${file.type.startsWith("image/") ? "🖼" : "📄"}</span>
          <span>${file.name}</span>
          <button class="file-preview-remove" id="remove-file">✕</button>
        </div>`;
      document.getElementById("remove-file").addEventListener("click", () => {
        pendingFile = null;
        preview.classList.add("hidden");
        preview.innerHTML = "";
        e.target.value = "";
      });
    });

    // WELCOME
    document.getElementById("enter-btn").addEventListener("click", handleEnter);
    document.getElementById("username-input").addEventListener("keydown", e => { if (e.key === "Enter") handleEnter(); });

    function handleEnter() {
      const name = document.getElementById("username-input").value.trim();
      if (!name) { document.getElementById("welcome-error").textContent = "اسمت رو بنویس!"; return; }
      if (["claude","gemini","perplexity"].includes(name.toLowerCase())) { document.getElementById("welcome-error").textContent = "این اسم رزرو شده!"; return; }
      document.getElementById("welcome-error").textContent = "";
      currentUser = name;
      localStorage.setItem("chat_username", name);
      showChat();
    }

    function checkSavedUser() {
      const saved = localStorage.getItem("chat_username");
      if (saved) { currentUser = saved; showChat(); }
    }

    document.getElementById("logout-btn").addEventListener("click", () => {
      localStorage.removeItem("chat_username");
      currentUser = null; allMessages = [];
      document.getElementById("chat-screen").classList.add("hidden");
      document.getElementById("welcome-screen").classList.remove("hidden");
      document.getElementById("username-input").value = "";
    });

    function showChat() {
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("chat-screen").classList.remove("hidden");
      document.getElementById("sidebar-username").textContent = currentUser;
      document.getElementById("sidebar-avatar").textContent = currentUser.charAt(0).toUpperCase();
      listenMessages();
    }

    function listenMessages() {
      const mc = document.getElementById("messages-container");
      mc.innerHTML = '<div class="loading-msgs">در حال بارگذاری...</div>';
      const q = query(messagesRef, orderBy("timestamp", "asc"));
      onSnapshot(q, snapshot => {
        allMessages = [];
        snapshot.forEach(d => allMessages.push({ id: d.id, ...d.data() }));
        renderMessages();
        updateMemberCount();
      });
    }

    function renderMessages() {
      const mc = document.getElementById("messages-container");
      const wasAtBottom = mc.scrollHeight - mc.scrollTop - mc.clientHeight < 100;
      mc.innerHTML = "";
      if (allMessages.length === 0) {
        mc.innerHTML = '<div class="loading-msgs">هنوز پیامی نیست. اولین نفر باش! 👋</div>';
        return;
      }
      allMessages.forEach(msg => mc.appendChild(createMessageEl(msg)));
      if (wasAtBottom || allMessages[allMessages.length-1]?.sender === currentUser) scrollToBottom();
    }

    function createMessageEl(msg) {
      const isC = msg.sender === "Claude";
      const isG = msg.sender === "Gemini";
      const isP = msg.sender === "Perplexity";
      const isMe = msg.sender === currentUser;
      const div = document.createElement("div");
      div.className = "msg-group" + (isC ? " is-claude" : isG ? " is-gemini" : isP ? " is-perplexity" : "");
      let timeStr = "";
      if (msg.timestamp) {
        const d = msg.timestamp.toDate ? msg.timestamp.toDate() : new Date(msg.timestamp);
        timeStr = d.toLocaleTimeString("fa-IR", { hour: "2-digit", minute: "2-digit" });
      }
      const avatarClass = isC ? "claude" : isG ? "gemini" : isP ? "perplexity" : "";
      const avatarText = isC ? "AI" : isG ? "G" : isP ? "P" : msg.sender.charAt(0).toUpperCase();
      const nameClass = isC ? "claude-name" : isG ? "gemini-name" : isP ? "perplexity-name" : "";

      let content = "";
      if (msg.isSearch) content += `<div class="search-badge">🔍 نتیجه سرچ</div>`;
      content += `<div class="msg-text">${esc(msg.text)}</div>`;

      const cachedImg = msg.imageId ? imageCache.get(msg.imageId) : msg.imageUrl;
      if (cachedImg) content += `<img class="msg-img" src="${cachedImg}" alt="تصویر" />`;
      else if (msg.imageId) content += `<div style="font-size:12px;color:var(--text3);margin-top:6px">🖼 عکس پس از refresh قابل نمایش نیست — دوباره بساز</div>`;

      if (msg.fileName) content += `<div class="msg-file"><span class="msg-file-icon">${msg.fileType?.startsWith("image/") ? "🖼" : "📄"}</span><span>${esc(msg.fileName)}</span></div>`;

      if (msg.sources && msg.sources.length > 0) {
        content += `<div class="msg-sources">`;
        msg.sources.slice(0, 5).forEach((s, i) => {
          content += `<a class="msg-source" href="${s}" target="_blank">منبع ${i+1}</a>`;
        });
        content += `</div>`;
      }

      div.innerHTML = `
        <div class="msg-avatar ${avatarClass}">${avatarText}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-name ${nameClass}">${esc(msg.sender)}</span>
            <span class="msg-time">${timeStr}</span>
            ${isMe ? `<button class="msg-delete" data-id="${msg.id}">🗑</button>` : ''}
          </div>
          ${content}
        </div>`;

      if (isMe) {
        div.querySelector('.msg-delete').addEventListener('click', () => deleteMessage(msg.id));
      }
      return div;
    }

    async function deleteMessage(id) {
      if (!confirm("پیام حذف بشه؟")) return;
      try { await deleteDoc(doc(db, "group_messages", id)); }
      catch (err) { console.error("Delete error:", err); }
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function scrollToBottom() {
      const mc = document.getElementById("messages-container");
      setTimeout(() => { mc.scrollTop = mc.scrollHeight; }, 50);
    }
    function updateMemberCount() {
      const senders = new Set(allMessages.map(m => m.sender).filter(s => !["Claude","Gemini","Perplexity"].includes(s)));
      document.getElementById("member-count").textContent = senders.size > 0 ? `${senders.size} نفر` : "";
    }

    // SEND
    document.getElementById("send-btn").addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    async function fileToBase64(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text && !pendingFile) return;
      if (!currentUser) return;

      msgInput.value = "";
      msgInput.style.height = "auto";
      document.getElementById("send-btn").disabled = true;

      let fileData = null;
      let fileName = null;
      let fileType = null;
      let fileBase64 = null;

      if (pendingFile) {
        fileName = pendingFile.name;
        fileType = pendingFile.type;
        fileBase64 = await fileToBase64(pendingFile);
        fileData = { base64: fileBase64, mimeType: fileType };
        pendingFile = null;
        document.getElementById("file-preview").classList.add("hidden");
        document.getElementById("file-preview").innerHTML = "";
        document.getElementById("file-input").value = "";
      }

      const msgText = text || `📎 فایل: ${fileName}`;

      try {
        await addDoc(messagesRef, {
          sender: currentUser,
          text: msgText,
          ...(fileName && { fileName, fileType }),
          timestamp: serverTimestamp()
        });

        const promises = [];
        if (claudeEnabled) promises.push(askClaude(text || `فایل ارسال شد: ${fileName}`, fileData));
        if (geminiEnabled) promises.push(askGemini(text || `فایل ارسال شد: ${fileName}`, fileData));
        if (perplexityEnabled) promises.push(askPerplexity(text || `فایل ارسال شد: ${fileName}`));
        await Promise.all(promises);
      } catch (err) { console.error(err); }
      finally { document.getElementById("send-btn").disabled = false; msgInput.focus(); }
    }

    // TOGGLES
    document.getElementById("claude-toggle").addEventListener("change", e => { claudeEnabled = e.target.checked; });
    document.getElementById("gemini-toggle").addEventListener("change", e => { geminiEnabled = e.target.checked; });
    document.getElementById("perplexity-toggle").addEventListener("change", e => { perplexityEnabled = e.target.checked; });

    function isImageRequest(text) {
      const keywords = ["تصویر", "عکس", "عکسی", "تصویری", "بساز", "بکش", "نقاشی", "image", "photo", "picture", "draw"];
      return keywords.some(k => text.toLowerCase().includes(k));
    }

    function isSearchRequest(text) {
      const keywords = ["سرچ کن", "جستجو کن", "پیدا کن", "بگرد", "اینترنت", "آنلاین", "اخبار", "جدیدترین", "آخرین", "امروز", "این هفته", "search", "find", "look up", "بررسی کن", "تحقیق کن", "چک کن", "ببین الان"];
      return keywords.some(k => text.toLowerCase().includes(k.toLowerCase()));
    }

    const CLAUDE_SYSTEM = `تو یک دستیار هوش مصنوعی در یک گروه چت هستی به نام "Planning With AI". اسمت Claude هست.
در این گروه Gemini (که تصویر می‌سازه و چت می‌کنه) و Perplexity (که سرچ اینترنت می‌کنه) هم هستن.
با بقیه دوستانه رفتار کن. هدف همه اینه که بهترین جواب رو به کاربر بدن.
به فارسی جواب بده مگر اینکه کاربر به زبان دیگه‌ای بنویسه. جواب‌هات کوتاه و مفید باشه.`;

    const GEMINI_SYSTEM = `تو یک دستیار هوش مصنوعی در یک گروه چت هستی به نام "Planning With AI". اسمت Gemini هست.
در این گروه Claude و Perplexity هم هستن. با بقیه دوستانه رفتار کن.
تو کاملاً قادر به ساخت تصویر هستی! وقتی کاربر تصویر خواست، بگو داری می‌سازی.
به فارسی جواب بده. جواب‌هات کوتاه و مفید باشه.
مهم: اسمت را همیشه Gemini بنویس. در انتهای پیام‌هات ننویس "Gemini هستم".`;

    const PERPLEXITY_CHAT = `تو Perplexity هستی در گروه "Planning With AI". Claude و Gemini هم هستن.
به فارسی جواب بده. جواب‌هات کوتاه و مفید باشه.`;

    const PERPLEXITY_SEARCH = `تو Perplexity هستی — متخصص سرچ اینترنت. اطلاعات به‌روز و دقیق بده. به فارسی جواب بده.`;

    async function askClaude(userMessage, fileData = null) {
      const typingEl = showTypingIndicator("Claude");
      try {
        const userContent = [];
        if (fileData && fileData.mimeType.startsWith("image/")) {
          userContent.push({ type: "image", source: { type: "base64", media_type: fileData.mimeType, data: fileData.base64 } });
        }
        userContent.push({ type: "text", text: `${currentUser}: ${userMessage}` });

        const history = allMessages.slice(-20).map(msg => ({
          role: msg.sender === "Claude" ? "assistant" : "user",
          content: msg.sender !== "Claude" ? `${msg.sender}: ${msg.text}` : msg.text
        }));
        if (!history.length || history[history.length-1].role !== "user") {
          history.push({ role: "user", content: userContent.length === 1 ? userContent[0].text : userContent });
        }

        const res = await fetch(`${WORKER_URL}/claude`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 1024, system: CLAUDE_SYSTEM, messages: history })
        });
        const data = await res.json();
        removeTypingIndicator(typingEl);
        if (data.content?.[0]?.text) {
          await addDoc(messagesRef, { sender: "Claude", text: data.content[0].text, timestamp: serverTimestamp() });
        }
      } catch (err) { removeTypingIndicator(typingEl); console.error("Claude:", err); }
    }

    async function askGemini(userMessage, fileData = null) {
      const typingEl = showTypingIndicator("Gemini");
      try {
        const userParts = [];
        if (fileData) {
          userParts.push({ inlineData: { mimeType: fileData.mimeType, data: fileData.base64 } });
        }
        userParts.push({ text: `${currentUser}: ${userMessage}` });

        const history = allMessages.slice(-20)
          .filter(m => m.sender !== "Claude" && m.sender !== "Perplexity")
          .map(msg => ({
            role: msg.sender === "Gemini" ? "model" : "user",
            parts: [{ text: msg.sender !== "Gemini" ? `${msg.sender}: ${msg.text}` : msg.text }]
          }));
        if (!history.length || history[history.length-1].role !== "user") {
          history.push({ role: "user", parts: userParts });
        }

        const chatRes = await fetch(`${WORKER_URL}/gemini`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ system_instruction: { parts: [{ text: GEMINI_SYSTEM }] }, contents: history })
        });
        const chatData = await chatRes.json();
        const chatText = chatData.candidates?.[0]?.content?.parts?.find(p => p.text)?.text || "";
        removeTypingIndicator(typingEl);

        if (isImageRequest(userMessage)) {
          await addDoc(messagesRef, { sender: "Gemini", text: chatText || "دارم تصویر می‌سازم... 🎨", timestamp: serverTimestamp() });
          const imgTyping = showTypingIndicator("Gemini");
          try {
            const imgRes = await fetch(`${WORKER_URL}/gemini-image`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: [{ parts: [{ text: userMessage }] }], generationConfig: { responseModalities: ["TEXT", "IMAGE"] } })
            });
            const imgData = await imgRes.json();
            removeTypingIndicator(imgTyping);
            const parts = imgData.candidates?.[0]?.content?.parts || [];
            let imageUrl = null;
            for (const part of parts) {
              if (part.inlineData) { imageUrl = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`; break; }
            }
            if (imageUrl) {
              const imageId = "img_" + Date.now();
              imageCache.set(imageId, imageUrl);
              await addDoc(messagesRef, { sender: "Gemini", text: "تصویر آماده شد! 🎨", imageId, timestamp: serverTimestamp() });
            } else {
              await addDoc(messagesRef, { sender: "Gemini", text: "متأسفم، نتونستم تصویر بسازم. دوباره امتحان کن.", timestamp: serverTimestamp() });
            }
          } catch (e) { removeTypingIndicator(imgTyping); }
        } else if (chatText) {
          await addDoc(messagesRef, { sender: "Gemini", text: chatText, timestamp: serverTimestamp() });
        }
      } catch (err) { removeTypingIndicator(typingEl); console.error("Gemini:", err); }
    }

    async function askPerplexity(userMessage) {
      const typingEl = showTypingIndicator("Perplexity");
      const doSearch = isSearchRequest(userMessage);
      try {
        const rawHistory = allMessages.slice(-10)
          .filter(m => m.sender !== "Claude" && m.sender !== "Gemini")
          .map(msg => ({
            role: msg.sender === "Perplexity" ? "assistant" : "user",
            content: msg.sender !== "Perplexity" ? `${msg.sender}: ${msg.text}` : msg.text
          }));
        const history = [];
        for (const msg of rawHistory) {
          if (history.length > 0 && history[history.length-1].role === msg.role) continue;
          history.push(msg);
        }
        if (!history.length || history[history.length-1].role !== "user") {
          history.push({ role: "user", content: `${currentUser}: ${userMessage}` });
        }
        const res = await fetch(`${WORKER_URL}/perplexity`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "sonar", messages: [{ role: "system", content: doSearch ? PERPLEXITY_SEARCH : PERPLEXITY_CHAT }, ...history] })
        });
        const data = await res.json();
        removeTypingIndicator(typingEl);
        const text = data.choices?.[0]?.message?.content;
        const sources = doSearch ? (data.citations || []) : [];
        if (text) {
          await addDoc(messagesRef, { sender: "Perplexity", text, sources, isSearch: doSearch, timestamp: serverTimestamp() });
        }
      } catch (err) { removeTypingIndicator(typingEl); console.error("Perplexity:", err); }
    }

    function showTypingIndicator(who) {
      const isG = who === "Gemini"; const isP = who === "Perplexity";
      const div = document.createElement("div");
      div.className = "msg-group " + (isG ? "is-gemini" : isP ? "is-perplexity" : "is-claude");
      div.innerHTML = `
        <div class="msg-avatar ${isG ? 'gemini' : isP ? 'perplexity' : 'claude'}">${isG ? 'G' : isP ? 'P' : 'AI'}</div>
        <div class="msg-content">
          <div class="msg-header"><span class="msg-name ${isG ? 'gemini-name' : isP ? 'perplexity-name' : 'claude-name'}">${who}</span></div>
          <div class="typing-indicator ${isG ? 'gemini-typing' : isP ? 'perplexity-typing' : ''}"><span></span><span></span><span></span></div>
        </div>`;
      document.getElementById("messages-container").appendChild(div);
      scrollToBottom();
      return div;
    }

    function removeTypingIndicator(el) { if (el?.parentNode) el.parentNode.removeChild(el); }

    // IMAGE MODAL
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('msg-img')) {
        const src = e.target.src;
        document.getElementById('img-modal-img').src = src;
        document.getElementById('img-modal').classList.add('active');
        document.getElementById('img-modal-download').onclick = () => {
          const a = document.createElement('a'); a.href = src; a.download = 'gemini-image.png'; a.click();
        };
        document.getElementById('img-modal-copy').onclick = async () => {
          try {
            const res = await fetch(src); const blob = await res.blob();
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
            document.getElementById('img-modal-copy').textContent = '✅ کپی شد!';
            setTimeout(() => { document.getElementById('img-modal-copy').textContent = '📋 کپی'; }, 2000);
          } catch { alert('کپی موفق نبود'); }
        };
      }
    });
    document.getElementById('img-modal-close').addEventListener('click', () => document.getElementById('img-modal').classList.remove('active'));
    document.getElementById('img-modal').addEventListener('click', (e) => { if (e.target === document.getElementById('img-modal')) document.getElementById('img-modal').classList.remove('active'); });

    checkSavedUser();
  </script>
</body>
</html>
